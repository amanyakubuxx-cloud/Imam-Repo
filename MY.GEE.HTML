<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You Siyam ❤️</title>
    <style>
        /* --- IMPORT FONTS --- */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500;700&display=swap');

        /* --- RESET & BASE STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent scrolling */
            font-family: 'Poppins', sans-serif;
            background-color: #1a0b14; /* Fallback */
            color: #fff;
        }

        /* --- ANIMATED BACKGROUND --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: linear-gradient(-45deg, #2b0f1e, #4a192c, #0f0518, #380e1e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- MAIN CONTAINER --- */
        #app {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        /* --- TYPOGRAPHY & GLOWS --- */
        .neon-text {
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #ff00de,
                0 0 30px #ff00de,
                0 0 40px #ff00de;
            animation: textPulse 2s infinite alternate;
        }

        .main-title {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: #fff;
        }

        .sub-text {
            font-size: 1rem;
            font-weight: 300;
            color: #ffdde1;
            min-height: 1.5em; /* Prevent layout shift */
            margin-bottom: 40px;
            text-shadow: 0 0 5px rgba(255, 77, 109, 0.5);
        }

        @keyframes textPulse {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #ff00de, 0 0 30px #ff00de; }
            to { text-shadow: 0 0 20px #fff, 0 0 30px #ff4d6d, 0 0 40px #ff4d6d; }
        }

        /* --- BUTTON STYLES --- */
        .magic-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 0 15px rgba(255, 0, 222, 0.3);
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
            position: relative;
            overflow: hidden;
        }

        .magic-btn:hover {
            background: #ff00de;
            box-shadow: 0 0 30px #ff00de, 0 0 60px #ff00de;
            transform: scale(1.05);
            border-color: transparent;
        }

        .magic-btn:active {
            transform: scale(0.95);
        }

        /* --- SECTIONS & TRANSITIONS --- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: opacity 1s ease, transform 1s ease;
        }

        /* Landing Screen */
        #landing-screen {
            opacity: 1;
            transform: scale(1);
        }

        /* Message Screen (Initially Hidden) */
        #message-screen {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
        }

        /* Active State for Message */
        #message-screen.active {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
        }

        .hidden {
            display: none !important;
        }

        /* --- MESSAGE CONTENT STYLES --- */
        .message-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 90%;
            width: 400px;
        }

        .romantic-heading {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #ff9a9e, #fecfef, #feada6);
         -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .typewriter-text {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #ffeef1;
            text-align: left;
            white-space: pre-wrap; /* Keeps line breaks */
            min-height: 100px;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background-color: #ff00de;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .main-title { font-size: 2.8rem; }
            .magic-btn { padding: 12px 30px; font-size: 1rem; }
            .romantic-heading { font-size: 2.5rem; }
            .message-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <!-- CANVAS FOR PARTICLES -->
    <canvas id="bg-canvas"></canvas>

    <!-- AUDIO ELEMENT -->
    <!-- Using a royalty-free romantic piano track -->
    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_2493c1329e.mp3?filename=romantic-piano-124966.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div id="app">
        <!-- LANDING SCREEN -->
        <section id="landing-screen" class="screen">
            <h1 class="main-title neon-text">Hi Siyam ❤️</h1>
            <p id="typing-intro" class="sub-text"></p>
            <button id="open-btn" class="magic-btn">Open My Message 💌</button>
        </section>

        <!-- MESSAGE SCREEN -->
        <section id="message-screen" class="screen">
            <div class="message-card">
                <h1 class="romantic-heading">For You</h1>
                <div id="final-message" class="typewriter-text"></div><span class="cursor">&nbsp;</span>
            </div>
        </section>
    </div>

    <script>
        /**
         * CONFIGURATION
         */
        const CONFIG = {
            name: "Siyam",
            introText: "I made this little surprise just for you To Make Happy...",
            messageText: "Have a Beautiful Day Siyam ❤️\n\nYou deserve happiness and smiles today. Keep shining like the star you are!",
            colors: ['#ff00de', '#ff99cc', '#fff', '#ff4d6d']
        };

        /**
         * DOM ELEMENTS
         */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const landingScreen = document.getElementById('landing-screen');
        const messageScreen = document.getElementById('message-screen');
        const openBtn = document.getElementById('open-btn');
        const audio = document.getElementById('bg-music');
        const introTypingEl = document.getElementById('typing-intro');
        const finalMessageEl = document.getElementById('final-message');

        let width, height;
        let particles = [];
        let hearts = []; // Specific floating hearts
        let animationId;

        /**
         * CANVAS SETUP & RESIZE
         */
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        /**
         * PARTICLE CLASSES
         */
        
        // Background Floating Hearts
        class Heart {
            constructor() {
                this.x = Math.random() * width;
                this.y = height + Math.random() * 100;
                this.speed = 1 + Math.random() * 2;
                this.opacity = 0.3 + Math.random() * 0.5;
                this.size = 10 + Math.random() * 20;
                this.oscillation = Math.random() * 20; // Side to side movement width
                this.angle = Math.random() * Math.PI * 2;
                this.spinSpeed = 0.02 + Math.random() * 0.03;
            }

            update() {
                this.y -= this.speed;
                this.angle += this.spinSpeed;
                this.x += Math.sin(this.angle) * 0.5; // Gentle sway

                // Reset if goes off top
                if (this.y < -50) {
                    this.y = height + 50;
                    this.x = Math.random() * width;
                }
            }

            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ff4d6d';
                ctx.font = `${this.size}px serif`;
                ctx.fillText('❤', this.x, this.y);
                ctx.globalAlpha = 1;
            }
        }

        // Explosion Particle (Sparkles/Mini Hearts)
        class ExplosionParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const velocity = 2 + Math.random() * 6;
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity;
                this.life = 100 + Math.random() * 50;
                this.color = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
                this.size = 2 + Math.random() * 4;
                this.gravity = 0.05;
                this.type = Math.random() > 0.5 ? 'circle' : 'heart';
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.life--;
                this.size *= 0.96; // Shrink
            }

            draw() {
                ctx.globalAlpha = this.life / 150;
                ctx.fillStyle = this.color;
                
                if (this.type === 'heart') {
                    ctx.font = `${this.size * 2}px serif`;
                    ctx.fillText('❤', this.x, this.y);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
        }

        // Initialize Background Hearts
        function initBackground() {
            for (let i = 0; i < 15; i++) {
                hearts.push(new Heart());
            }
        }

        // Animation Loop
        function animate() {
            ctx.clearRect(0, 0, width, height);

            // Update/Draw Background Hearts
            hearts.forEach(heart => {
                heart.update();
                heart.draw();
            });

            // Update/Draw Explosion Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0 || p.size < 0.5) {
                    particles.splice(i, 1);
                }
            }

            animationId = requestAnimationFrame(animate);
        }

        /**
         * UTILITY: TYPEWRITER EFFECT
         */
        function typeWriter(element, text, speed, callback) {
            let i = 0;
            element.innerHTML = '';
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        /**
         * INTERACTION HANDLERS
         */
        
        // 1. Initial Typing on Load
        window.onload = () => {
            initBackground();
            animate();
            typeWriter(introTypingEl, CONFIG.introText, 50);
        };

        // 2. Button Click Event
        openBtn.addEventListener('click', (e) => {
            // Play Music
            audio.volume = 0.5;
            audio.play().catch(e => console.log("Audio play blocked:", e));

            // Explosion Effect (Get button center)
            const rect = openBtn.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // Create 50 explosion particles
            for (let i = 0; i < 50; i++) {
                particles.push(new ExplosionParticle(centerX, centerY));
            }

            // Screen Transition
            landingScreen.style.opacity = '0';
            landingScreen.style.transform = 'scale(1.5)';
            
            setTimeout(() => {
                landingScreen.classList.add('hidden');
                messageScreen.classList.add('active');
                
                // Start Final Typing
                setTimeout(() => {
                    typeWriter(finalMessageEl, CONFIG.messageText, 60);
                }, 500);
            }, 800);
        });

    </script>
</body>
</html>
